<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ali Belalia | Developer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0d1117;
    color:#c9d1d9;
}

/* Container */
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* Header */
.header{
    display:flex;
    align-items:center;
    gap:20px;
}

.header img{
    width:100px;
    border-radius:50%;
    border:2px solid #30363d;
}

.header h1{
    font-size:28px;
    color:#58a6ff;
}

.header p{
    color:#8b949e;
}

/* Sections */
.section{
    margin-top:40px;
}

.section h2{
    margin-bottom:15px;
    color:#58a6ff;
}

/* Skills */
.skills span{
    display:inline-block;
    background:#161b22;
    padding:8px 12px;
    margin:5px;
    border-radius:6px;
    border:1px solid #30363d;
}

/* Links */
.links a{
    display:inline-block;
    margin:10px 10px 0 0;
    padding:10px 15px;
    border-radius:6px;
    text-decoration:none;
    color:white;
    background:#238636;
    transition:0.3s;
}

.links a:hover{
    background:#2ea043;
}

/* Card effect */
.card{
    background:#161b22;
    padding:20px;
    border-radius:10px;
    border:1px solid #30363d;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(88,166,255,0.2);
}
</style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header card">
        <img src="https://via.placeholder.com/150">
        <div>
            <h1>Ali Belalia</h1>
            <p>Developer | Tech Enthusiast</p>
        </div>
    </div>

    <!-- About -->
    <div class="section card">
        <h2>About Me</h2>
        <p>
            Passionate developer focused on building modern digital experiences.
            I love technology, coding, and creating useful content.
        </p>
    </div>

    <!-- Skills -->
    <div class="section card">
        <h2>Skills</h2>
        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>UI Design</span>
            <span>Content Creation</span>
        </div>
    </div>

    <!-- Links -->
    <div class="section card">
        <h2>Connect</h2>
        <div class="links">
            <a href="https://instagram.com/httpx.alibel">Instagram</a>
            <a href="https://facebook.com/httpx.alibel">Facebook</a>
            <a href="https://tiktok.com/httpx.alibel">TikTok</a>
            <a href="https://wa.me/213676933224">WhatsApp</a>
        </div>
    </div>

</div>

</body>
</html>
